name: Build Linux AppImage

# Builds the native KlipschRemote bundle with `flet build linux` and wraps it in
# a portable AppImage (build_app.sh). Manual-only: produces the AppImage as a
# downloadable artifact for testing. Tag-driven releases are handled by
# release.yml (which builds Windows + Linux together and publishes one Release).
#
# Built on Ubuntu 22.04 (glibc 2.35) as the compatibility baseline: an AppImage
# linked there runs on that distro and anything newer (most current distros).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Flutter's Linux desktop toolchain + the AppImage tooling. libfuse2 lets
      # appimagetool run normally (build_app.sh also sets APPIMAGE_EXTRACT_AND_RUN
      # as a fallback when FUSE is missing).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            file wget libfuse2

      # `flet build` downloads and manages its own pinned Flutter SDK under
      # ~/flutter; cache it (and the pub cache) so reruns skip the multi-minute
      # first-time download/compile. Keyed on the flet version in pyproject.toml.
      - name: Cache Flutter SDK and pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/flutter
            ~/.pub-cache
          key: flet-flutter-${{ runner.os }}-${{ hashFiles('packaging/pyproject.toml') }}
          restore-keys: |
            flet-flutter-${{ runner.os }}-

      - name: Install pinned dependencies (flet CLI + app deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Stages a clean project, runs `flet build linux`, then packages the bundle
      # into a portable AppImage in dist_installer/ (window start is steered at
      # runtime via FLET_HIDE_WINDOW_ON_START in AppRun - no runner recompile).
      - name: Build AppImage (build_app.sh)
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlipschRemote-AppImage
          path: dist_installer/KlipschRemote-x86_64.AppImage
          if-no-files-found: error
