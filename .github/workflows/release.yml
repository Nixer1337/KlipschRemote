name: Release

# One-shot release pipeline: on a version tag (v*) it builds BOTH the Windows
# installer and the Linux AppImage in parallel, then publishes them together to
# a SINGLE GitHub Release named after the tag.
#
# How to cut a release:
#   git tag v0.2.0
#   git push origin v0.2.0
# -> two build jobs run, then one Release "Klipsch Remote v0.2.0" with both
#    KlipschRemote-Setup.exe and KlipschRemote-x86_64.AppImage attached.
#
# (The standalone Build Windows installer / Build Linux AppImage workflows are
# manual-only now and do NOT publish releases, so a tag produces exactly one.)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the Release and attach assets

jobs:
  # ---------------------------------------------------------------- Windows --
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter creates plugin symlinks during `flet build`. Runners are elevated
      # so this usually works, but enabling Developer Mode + git symlinks makes it
      # deterministic regardless of the plugin set.
      - name: Enable Developer Mode and git symlinks
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
            /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"
          git config --global core.symlinks true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `flet build` downloads and manages its own pinned Flutter SDK under
      # %USERPROFILE%\flutter; cache it (and the pub cache) so reruns skip the
      # multi-minute first-time download/compile. Keyed on the flet version
      # declared in pyproject.toml so a flet bump invalidates the cache.
      - name: Cache Flutter SDK and pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/flutter
            ~/AppData/Local/Pub/Cache
          key: flet-flutter-${{ runner.os }}-${{ hashFiles('packaging/pyproject.toml') }}
          restore-keys: |
            flet-flutter-${{ runner.os }}-

      - name: Install pinned dependencies (flet CLI + app deps)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Stamp the installer's version from the tag (strip the leading "v") so the
      # Setup.exe / Add-Remove-Programs entry matches the release. Falls back to
      # the value already in installer.iss if the tag isn't vX.Y.Z shaped.
      - name: Set installer version from tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if ($ver -match '^\d+(\.\d+){1,3}$') {
            (Get-Content installer.iss) `
              -replace '(#define MyAppVersion ").*(")', "`${1}$ver`${2}" |
              Set-Content installer.iss
            Write-Host "installer.iss MyAppVersion -> $ver"
          } else {
            Write-Host "Tag '$ver' not X.Y.Z; keeping installer.iss version as-is"
          }

      # Stages a clean project, runs `flet build windows`, patches the runner
      # (hidden/centred/sized window) + lib/main.dart (hide_window_on_start), then
      # recompiles and collects the bundle into dist_app\.
      - name: Build native bundle (flet build)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File build_app.ps1

      # Inno Setup is preinstalled on windows-latest; fall back to Chocolatey if a
      # future image drops it.
      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlipschRemote-Setup
          path: dist_installer/KlipschRemote-Setup.exe
          if-no-files-found: error

  # ------------------------------------------------------------------ Linux --
  linux:
    # Ubuntu 22.04 (glibc 2.35) compatibility baseline: an AppImage linked there
    # runs on that distro and anything newer (most current distros).
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Flutter's Linux desktop toolchain + the AppImage tooling. libfuse2 lets
      # appimagetool run normally (build_app.sh also sets APPIMAGE_EXTRACT_AND_RUN
      # as a fallback when FUSE is missing).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            file wget libfuse2

      # `flet build` downloads and manages its own pinned Flutter SDK under
      # ~/flutter; cache it (and the pub cache) so reruns skip the multi-minute
      # first-time download/compile. Keyed on the flet version in pyproject.toml.
      - name: Cache Flutter SDK and pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/flutter
            ~/.pub-cache
          key: flet-flutter-${{ runner.os }}-${{ hashFiles('packaging/pyproject.toml') }}
          restore-keys: |
            flet-flutter-${{ runner.os }}-

      - name: Install pinned dependencies (flet CLI + app deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Stages a clean project, runs `flet build linux`, then packages the bundle
      # into a portable AppImage in dist_installer/ (window start is steered at
      # runtime via FLET_HIDE_WINDOW_ON_START in AppRun - no runner recompile).
      - name: Build AppImage (build_app.sh)
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlipschRemote-AppImage
          path: dist_installer/KlipschRemote-x86_64.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------- Release --
  # Runs only after BOTH builds succeed, so a half-built release never ships.
  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      # Pull both build jobs' uploaded artifacts into ./artifacts/<name>/.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Named, published (non-draft) release with auto-generated notes from
          # the commits since the previous tag; both installers attached.
          name: Klipsch Remote ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/KlipschRemote-Setup/KlipschRemote-Setup.exe
            artifacts/KlipschRemote-AppImage/KlipschRemote-x86_64.AppImage
